<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Event Portal - JavaScript Exercises</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      color: #1f2937;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 24px;
    }
    .event-list,
    .form-section,
    .filter-section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 20px;
    }
    .event-card {
      border: 1px solid #d1d5db;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .event-card h3 {
      margin-top: 0;
    }
    .event-card button {
      padding: 10px 18px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    .event-card button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .hidden {
      display: none;
    }
    .error {
      color: #b91c1c;
    }
    .success {
      color: #166534;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .form-row label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .form-row input,
    .form-row select,
    .form-row textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
    }
    .form-row textarea {
      resize: vertical;
      min-height: 100px;
    }
    .filter-section select,
    .filter-section input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
    }
    .loading {
      margin-top: 10px;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Local Community Event Portal</h1>
      <p>View and register for upcoming local events. Filter by category, search by name, and use the form to register.</p>
    </header>

    <section class="filter-section">
      <h2>Filter Events</h2>
      <div class="form-row">
        <div style="flex: 1">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="all">All</option>
            <option value="music">Music</option>
            <option value="workshop">Workshop</option>
            <option value="community">Community</option>
          </select>
        </div>
        <div style="flex: 1">
          <label for="locationFilter">Location</label>
          <select id="locationFilter">
            <option value="all">All</option>
            <option value="park">Park</option>
            <option value="hall">Community Hall</option>
            <option value="square">Town Square</option>
          </select>
        </div>
        <div style="flex: 1">
          <label for="searchInput">Search by Event Name</label>
          <input type="text" id="searchInput" placeholder="Search events..." />
        </div>
      </div>
    </section>

    <section class="event-list" id="eventListSection">
      <h2>Upcoming Events</h2>
      <div id="eventsContainer"></div>
      <p id="noEventsMessage" class="hidden">No events match your search criteria.</p>
    </section>

    <section class="form-section">
      <h2>Register for an Event</h2>
      <form id="registrationForm">
        <div class="form-row">
          <div style="flex: 1">
            <label for="userName">Name</label>
            <input type="text" id="userName" required />
          </div>
          <div style="flex: 1">
            <label for="userEmail">Email</label>
            <input type="email" id="userEmail" required />
          </div>
        </div>
        <div class="form-row" style="margin-top: 16px;">
          <div style="flex: 1">
            <label for="eventSelect">Select Event</label>
            <select id="eventSelect"></select>
          </div>
        </div>
        <button type="submit" style="margin-top: 16px; padding: 12px 20px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer;">Submit Registration</button>
        <p id="formMessage"></p>
      </form>
    </section>

    <section class="form-section">
      <h2>AJAX Simulation</h2>
      <button id="loadEventsBtn" style="padding: 10px 18px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer;">Load Events from Mock API</button>
      <p id="loadingStatus" class="loading hidden">Loading events...</p>
    </section>
  </div>

  <script src="main.js"></script>
</body>
</html>
